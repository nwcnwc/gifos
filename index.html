<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GifOS — Your GIF-Powered Operating System</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0f;
  --surface: #14141f;
  --border: #2a2a3f;
  --text: #e0e0f0;
  --muted: #8888aa;
  --accent: #7b5cff;
  --accent2: #ff5caa;
  --glow: rgba(123, 92, 255, 0.3);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.container {
  max-width: 720px;
  width: 100%;
  padding: 2rem;
  text-align: center;
}
h1 {
  font-size: 3rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 0.5rem;
}
.tagline {
  color: var(--muted);
  font-size: 1.1rem;
  margin-bottom: 3rem;
}
.dropzone {
  border: 2px dashed var(--border);
  border-radius: 1rem;
  padding: 4rem 2rem;
  background: var(--surface);
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}
.dropzone:hover, .dropzone.dragover {
  border-color: var(--accent);
  box-shadow: 0 0 40px var(--glow);
  background: rgba(123, 92, 255, 0.05);
}
.dropzone-icon {
  font-size: 4rem;
  margin-bottom: 1rem;
}
.dropzone-text {
  font-size: 1.2rem;
  margin-bottom: 0.5rem;
}
.dropzone-sub {
  color: var(--muted);
  font-size: 0.9rem;
}
.status {
  margin-top: 2rem;
  padding: 1rem;
  border-radius: 0.5rem;
  display: none;
}
.status.show { display: block; }
.status.info { background: rgba(123, 92, 255, 0.1); border: 1px solid var(--accent); }
.status.error { background: rgba(255, 92, 92, 0.1); border: 1px solid #ff5c5c; }
.status.success { background: rgba(92, 255, 123, 0.1); border: 1px solid #5cff7b; }
#app-container {
  display: none;
  width: 100%;
  margin-top: 2rem;
  border-radius: 1rem;
  overflow: hidden;
  border: 1px solid var(--border);
  background: white;
}
#app-container iframe {
  width: 100%;
  min-height: 600px;
  border: none;
}
.toolbar {
  display: none;
  gap: 0.5rem;
  margin-top: 1rem;
  justify-content: center;
}
.toolbar.show { display: flex; }
.btn {
  padding: 0.5rem 1.5rem;
  border-radius: 0.5rem;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  font-size: 0.9rem;
  transition: all 0.2s;
}
.btn:hover {
  border-color: var(--accent);
  box-shadow: 0 0 20px var(--glow);
}
.btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}
footer {
  margin-top: 3rem;
  color: var(--muted);
  font-size: 0.8rem;
}
footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<div class="container">
  <h1>GifOS</h1>
  <p class="tagline">Your GIF-powered operating system. Drop an App GIF to begin.</p>
  
  <div class="dropzone" id="dropzone">
    <div class="dropzone-icon">📦</div>
    <div class="dropzone-text">Drop a GIF here</div>
    <div class="dropzone-sub">App GIF to load an application • Data GIF to restore state</div>
    <input type="file" id="file-input" accept=".gif,image/gif" style="display:none">
  </div>
  
  <div class="status" id="status"></div>
  
  <div class="toolbar" id="toolbar">
    <button class="btn primary" id="btn-save">💾 Save as GIF</button>
    <button class="btn" id="btn-load">📂 Load Data GIF</button>
    <button class="btn" id="btn-reset">🔄 Reset</button>
  </div>
  
  <div id="app-container">
    <iframe id="app-frame" sandbox="allow-scripts allow-same-origin"></iframe>
  </div>
  
  <footer>
    <a href="https://gifos.app">gifos.app</a> — Apps are GIFs. Data is GIFs. Everything is just files.
  </footer>
</div>

<script>
// GifOS Shell v0.1.0
// The universal runtime for GIF-encoded applications

const $ = (sel) => document.querySelector(sel);
const dropzone = $('#dropzone');
const fileInput = $('#file-input');
const status = $('#status');
const toolbar = $('#toolbar');
const appContainer = $('#app-container');
const appFrame = $('#app-frame');

let currentApp = null;

// --- Drag & Drop ---
['dragenter', 'dragover'].forEach(e => {
  dropzone.addEventListener(e, (ev) => { ev.preventDefault(); dropzone.classList.add('dragover'); });
});
['dragleave', 'drop'].forEach(e => {
  dropzone.addEventListener(e, (ev) => { ev.preventDefault(); dropzone.classList.remove('dragover'); });
});
dropzone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => { if (e.target.files[0]) handleFile(e.target.files[0]); });
dropzone.addEventListener('drop', (e) => {
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});

// --- File Handler ---
async function handleFile(file) {
  if (!file.type.includes('gif') && !file.name.endsWith('.gif')) {
    showStatus('Not a GIF file. Please drop an App GIF or Data GIF.', 'error');
    return;
  }
  showStatus('Decoding GIF...', 'info');
  try {
    const buffer = await file.arrayBuffer();
    const payload = decodeGifOS(new Uint8Array(buffer));
    if (!payload) {
      showStatus('This GIF does not contain GifOS data. It may be a regular GIF image.', 'error');
      return;
    }
    if (payload.type === 'app') {
      loadApp(payload);
    } else if (payload.type === 'data') {
      loadData(payload);
    }
  } catch (err) {
    showStatus('Error decoding GIF: ' + err.message, 'error');
  }
}

// --- GIF Decoder (reads GIFOS Application Extension blocks) ---
function decodeGifOS(bytes) {
  // Find GIFOS1.0 Application Extension
  const marker = [0x47, 0x49, 0x46, 0x4F, 0x53, 0x31, 0x2E, 0x30]; // "GIFOS1.0"
  let pos = 0;
  while (pos < bytes.length - 20) {
    // Application Extension: 0x21 0xFF
    if (bytes[pos] === 0x21 && bytes[pos + 1] === 0xFF) {
      const blockSize = bytes[pos + 2]; // should be 11
      if (blockSize === 11) {
        let match = true;
        for (let i = 0; i < 8; i++) {
          if (bytes[pos + 3 + i] !== marker[i]) { match = false; break; }
        }
        if (match) {
          // Found GIFOS block — read sub-blocks
          let dataPos = pos + 3 + 11; // skip identifier + auth code (3 bytes)
          let chunks = [];
          while (dataPos < bytes.length) {
            const subSize = bytes[dataPos];
            if (subSize === 0) break; // block terminator
            chunks.push(bytes.slice(dataPos + 1, dataPos + 1 + subSize));
            dataPos += 1 + subSize;
          }
          // Reassemble and decompress
          const totalLen = chunks.reduce((s, c) => s + c.length, 0);
          const assembled = new Uint8Array(totalLen);
          let offset = 0;
          for (const chunk of chunks) {
            assembled.set(chunk, offset);
            offset += chunk.length;
          }
          // Try to decompress (assume raw deflate)
          try {
            const text = new TextDecoder().decode(assembled);
            return JSON.parse(atob(text));
          } catch(e) {
            // May be compressed — need pako for production
            const text = new TextDecoder().decode(assembled);
            return JSON.parse(text);
          }
        }
      }
    }
    pos++;
  }
  return null;
}

// --- App Loader ---
function loadApp(app) {
  currentApp = app;
  const html = `
    <!DOCTYPE html>
    <html><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>${app.code.css || ''}</style>
    </head><body>
    ${app.code.html || ''}
    <script>${app.code.js || ''}<\/script>
    </body></html>
  `;
  appFrame.srcdoc = html;
  appContainer.style.display = 'block';
  toolbar.classList.add('show');
  showStatus(`✅ Loaded: ${app.name} v${app.version}`, 'success');
}

// --- Data Loader ---
function loadData(data) {
  if (!currentApp) {
    showStatus('Load an App GIF first, then drop a Data GIF.', 'error');
    return;
  }
  if (data.appId !== currentApp.appId) {
    showStatus(`Data GIF is for "${data.appId}" but current app is "${currentApp.appId}".`, 'error');
    return;
  }
  // Send state to the app iframe
  appFrame.contentWindow.postMessage({ type: 'gifos:loadState', state: data.state }, '*');
  showStatus(`✅ Loaded data from ${data.savedAt}`, 'success');
}

// --- Save Handler ---
$('#btn-save').addEventListener('click', () => {
  showStatus('Save functionality coming soon — GIF encoder in progress.', 'info');
});

$('#btn-reset').addEventListener('click', () => {
  currentApp = null;
  appContainer.style.display = 'none';
  toolbar.classList.remove('show');
  appFrame.srcdoc = '';
  showStatus('', '');
  status.classList.remove('show');
});

// --- UI Helpers ---
function showStatus(msg, type) {
  status.textContent = msg;
  status.className = 'status show ' + (type || '');
}

// Listen for messages from app iframe
window.addEventListener('message', (e) => {
  if (e.data?.type === 'gifos:saveState') {
    // App is requesting a save — encode to GIF
    console.log('Save requested:', e.data.state);
  }
});
</script>
</body>
</html>
