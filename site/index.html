<!-- Theming gate: hide chrome behind the theme-color backdrop until the theme
     cascade (js/gifos-themes.js) applies real vars, so the purple :root default
     from desktop.css never paints first. Reveals the instant --accent is set; a
     failsafe timeout guarantees we never stay hidden if a theme file 404s or
     hangs. See js/gifos-themes.js. -->
<style id="theme-gate">html.gifos-booting body{visibility:hidden}html.gifos-booting{background:#0a0a0f}</style>
<script>(function(){var h=document.documentElement;h.className+=(h.className?' ':'')+'gifos-booting';var shown=0;
function show(){if(shown)return;shown=1;h.classList.remove('gifos-booting');}
function chk(){if(shown)return;if(h.style.getPropertyValue('--accent'))show();else requestAnimationFrame(chk);}
requestAnimationFrame(chk);setTimeout(show,1500);})();</script>

<script>/* Global UI text size (Settings → Text size). Scales rem-based chrome everywhere; applied early to avoid a flash, and live across tabs via the storage event. */(function(){function ap(){try{var s=parseFloat(localStorage.getItem('gifos_ui_scale'))||1;s=Math.max(0.2,Math.min(3,s));document.documentElement.style.fontSize=(s===1?'':(16*s).toFixed(2)+'px');}catch(e){}}ap();try{window.addEventListener('storage',function(e){if(!e||e.key==='gifos_ui_scale')ap();});}catch(e){}})();</script>

<!-- CHANNEL LOADER — runs before any app code. The site root (/) is the UNRELEASED
     edge build; releases are immutable /versions/<x.y.z>/ snapshots. A fresh
     visitor follows the live-release pointer (version.json.current); '?edge' opts
     into the root edge build; a pin sticks to one snapshot. '?stable'/'?unpin'
     returns to the default release channel. Snapshots under /versions/ never
     redirect again. The pointer read is synchronous so the redirect happens
     before any app code runs (no flash, no wasted boot); after the first visit
     it's a cached fast path. Keep this snippet identical across the entry pages. -->
<script>
window.GIFOS_VERSION = 'edge';
(function () {
  if (location.pathname.indexOf('/versions/') !== -1) return;   // immutable build — never redirect
  var q; try { q = new URLSearchParams(location.search || ''); } catch (e) { q = null; }
  function has(k) { return !!(q && q.has(k)); }
  try {
    if (has('edge')) { localStorage.setItem('gifos_channel', 'edge'); localStorage.removeItem('gifos_pin'); }
    if (has('stable') || has('unpin') || has('latest')) { localStorage.removeItem('gifos_channel'); localStorage.removeItem('gifos_pin'); }
  } catch (e) {}
  var pin = null, chan = null, cur = null;
  try { pin = localStorage.getItem('gifos_pin'); chan = localStorage.getItem('gifos_channel'); cur = localStorage.getItem('gifos_current'); } catch (e) {}
  var here = location.pathname + location.hash;                 // carry the page + invite hash across
  function go(v) { location.replace('/versions/' + v + here); }
  if (pin) { go(pin); return; }                                // pinned to a snapshot
  if (chan === 'edge') return;                                  // opted into the edge build → run this root
  // Default channel follows the live release — but only on the real domain. On
  // localhost / preview hosts the root IS what you're developing, so stay edge.
  if (!/(^|\.)gifos\.app$/.test(location.hostname)) return;
  if (cur) { go(cur); return; }                                // default, fast path (last-known release)
  // Default, first visit: resolve the release pointer, then redirect. On failure
  // (offline, no cache) fall through and run this edge build.
  try {
    var x = new XMLHttpRequest(); x.open('GET', '/version.json?ts=' + Date.now(), false); x.send();
    var v = ''; try { v = (JSON.parse(x.responseText) || {}).current || ''; } catch (e) {}
    if (v) { try { localStorage.setItem('gifos_current', v); } catch (e) {} go(v); }
  } catch (e) {}
})();
</script>
