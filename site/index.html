<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GifOS — Your GIF-Powered Desktop</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%A6%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="css/desktop.css">
</head>
<body>
  <div class="menubar">
    <button class="brand-btn" id="sys-menu-btn"><span class="brand">GifOS</span><span class="caret">▾</span></button>
    <span class="crumbs" id="crumbs">Desktop</span>
    <span class="spacer"></span>
    <button id="add-btn">＋ Add</button>
    <button class="pill" id="storage-pill" title="Local storage used by this desktop">💾 …</button>
  </div>
  <div id="desktop"></div>
  <input type="file" id="file-input" multiple style="display:none">
  <input type="file" id="restore-input" accept=".gif,image/gif" style="display:none">

  <script src="js/gifos-gif.js"></script>
  <script src="js/gifos-store.js"></script>
  <script src="js/sample-apps.js"></script>
  <script src="js/desktop.js"></script>
</body>
</html>
