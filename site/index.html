<script>
// Version + pinning bootstrap. Runs before any app code. The canonical site
// (gifos.app/) is always the latest build; past builds live under
// /versions/<x.y.z>/. A user can pin a version (deep Settings) — we redirect
// here so the pin takes effect before anything else loads. ?unpin returns to
// latest. Archived builds live under /versions/ and never redirect again.
window.GIFOS_VERSION = '0.6.0';
(function () {
  window.gifosPinTarget = function (pathname, search) {
    var q = new URLSearchParams(search || '');
    if (q.has('unpin') || q.has('latest')) { try { localStorage.removeItem('gifos_pin'); } catch (e) {} return { clear: true }; }
    var pin = null; try { pin = localStorage.getItem('gifos_pin'); } catch (e) {}
    if (pin && pin !== window.GIFOS_VERSION && pathname.indexOf('/versions/') === -1) return { redirect: '/versions/' + pin + '/' };
    return null;
  };
  var d = window.gifosPinTarget(location.pathname, location.search);
  if (d && d.clear) history.replaceState(null, '', location.pathname);
  else if (d && d.redirect) location.replace(d.redirect);
})();
</script>
