<script>/* Global UI text size (Settings → Text size). Applied early; live across tabs. */(function(){function ap(){try{var s=parseFloat(localStorage.getItem('gifos_ui_scale'))||1;s=Math.max(0.7,Math.min(1.6,s));document.documentElement.style.fontSize=(s===1?'':(16*s).toFixed(2)+'px');}catch(e){}}ap();try{window.addEventListener('storage',function(e){if(!e||e.key==='gifos_ui_scale')ap();});}catch(e){}})();</script>
<title>GifOS — Booting image…</title>
<!-- CHANNEL LOADER — identical to index.html. The VM shell carries the SAME
     channel identity as its host: at the site root it is the edge build; under
     /versions/<x>/ it is that release. Runs before the boot sequence below. -->
<script>
window.GIFOS_VERSION = 'edge';
(function () {
  if (location.pathname.indexOf('/versions/') !== -1) return;   // immutable build — never redirect
  var q; try { q = new URLSearchParams(location.search || ''); } catch (e) { q = null; }
  function has(k) { return !!(q && q.has(k)); }
  try {
    if (has('edge')) { localStorage.setItem('gifos_channel', 'edge'); localStorage.removeItem('gifos_pin'); }
    if (has('stable') || has('unpin') || has('latest')) { localStorage.removeItem('gifos_channel'); localStorage.removeItem('gifos_pin'); }
  } catch (e) {}
  var pin = null, chan = null, cur = null;
  try { pin = localStorage.getItem('gifos_pin'); chan = localStorage.getItem('gifos_channel'); cur = localStorage.getItem('gifos_current'); } catch (e) {}
  var here = location.pathname + location.hash;
  function go(v) { location.replace('/versions/' + v + here); }
  if (pin) { go(pin); return; }
  if (chan === 'edge') return;
  if (!/(^|\.)gifos\.app$/.test(location.hostname)) return;     // non-prod (localhost/preview) → edge
  if (cur) { go(cur); return; }
  try {
    var x = new XMLHttpRequest(); x.open('GET', '/version.json?ts=' + Date.now(), false); x.send();
    var v = ''; try { v = (JSON.parse(x.responseText) || {}).current || ''; } catch (e) {}
    if (v) { try { localStorage.setItem('gifos_current', v); } catch (e) {} go(v); }
  } catch (e) { /* offline, no cache → run this edge build */ }
})();
</script>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%92%BF%3C/text%3E%3C/svg%3E">
<script>
/*
 * boot.html — run a whole-desktop backup GIF as a COMPUTER, inside its own
 * IndexedDB namespace ('gifos_vm_<fileId>'). The host desktop is untouched:
 * a computer image boots as a computer-within-a-computer, and since a booted
 * desktop can itself contain more images, GifOS boots inside itself all the
 * way down. Re-opening the same image resumes where that computer left off;
 * "Reboot fresh" wipes the namespace and re-hydrates from the image bytes.
 *
 * Sequence: bind GIFOS_DB_NAME → load the normal system scripts → hydrate the
 * namespace from the image (only if empty) → THEN inject desktop.js, which
 * finds a populated store and renders the booted desktop as usual.
 */
(function () {
  var p = new URLSearchParams(location.hash.slice(1));
  window.__bootImageId = p.get('id') || '';
  window.__bootFrom = p.get('from') || 'gifos';
  if (!/^gifos(_vm_[\w-]+)?$/.test(window.__bootFrom)) window.__bootFrom = 'gifos';
  window.GIFOS_DB_NAME = 'gifos_vm_' + window.__bootImageId;
})();
</script>
<link rel="stylesheet" href="css/desktop.css">
<style>
  .vm-banner { display: flex; align-items: center; gap: .6rem; padding: .35rem .9rem;
    background: linear-gradient(90deg, #1b1230, #12121c); border-bottom: 1px solid #3a2a5f;
    font-size: .78rem; color: #b9a5ff; }
  .vm-banner b { color: #e0d5ff; }
  .vm-banner button { margin-left: auto; padding: .25rem .7rem; border-radius: .4rem;
    border: 1px solid #3a2a5f; background: #1c1c2b; color: #b9a5ff; cursor: pointer; font-size: .74rem; }
  .vm-banner button:hover { border-color: #7b5cff; }
  .boot-fail { padding: 3rem 1.5rem; text-align: center; color: #8888aa; font: 15px system-ui; }
</style>
</head>
<body>
  <div class="vm-banner"><span>Booted image: <b id="vm-name">…</b> — this computer runs in its own space; your real Home Screen is untouched.</span>
    <button id="vm-reboot" title="Wipe this booted computer's changes and re-hydrate it from the image bytes">Reboot fresh</button>
  </div>
  <div class="update-bar" id="update-bar" style="display:none">
    <span id="update-msg"></span>
    <button id="update-action">Reload</button>
    <button class="dismiss" id="update-dismiss" title="Dismiss">✕</button>
  </div>
  <div class="menubar">
    <button class="brand-btn" id="sys-menu-btn"><span class="brand">GifOS</span><span class="caret">▾</span></button>
    <span class="crumbs" id="crumbs">Home Screen</span>
    <span class="spacer"></span>
    <button id="add-btn">＋ Add</button>
  </div>
  <div id="desktop"></div>
  <input type="file" id="file-input" multiple style="display:none">
  <input type="file" id="restore-input" accept=".gif,image/gif" style="display:none">

  <script src="js/gifos-gif.js"></script>
  <script src="js/gifos-sign.js"></script>
  <script src="js/gifos-zip.js"></script>
  <script src="js/gifos-icons.js"></script>
  <script src="js/gifos-themes.js"></script>
  <script src="js/gifos-store.js"></script>
  <script src="js/irl-apps.js"></script>
  <script src="js/sample-apps.js"></script>
  <script src="js/build.js"></script>
  <script>
  (function () {
    var gif = GifOS.gif;
    var vm = GifOS.store;                                   // bound to gifos_vm_<id>
    var host = GifOS.store.namespace(window.__bootFrom);    // where the image bytes live

    function fail(msg) {
      document.getElementById('desktop').innerHTML = '<div class="boot-fail">' + msg + '</div>';
      document.getElementById('vm-name').textContent = 'boot failed';
    }

    function hydrate(archive) {
      var dj = GifOS.store.unpackJSON(gif.bytesToText(archive.files['desktop.json'])); // binary-safe: media blobs survive
      var chain = Promise.resolve();
      (dj.fileMeta || []).forEach(function (m) {
        var bytes = archive.files['files/' + m.id];
        if (bytes) chain = chain.then(function () { return vm.putFile(Object.assign({}, m, { bytes })); });
      });
      (dj.items || []).forEach(function (it) { chain = chain.then(function () { return vm.putItem(it); }); });
      (dj.states || []).forEach(function (s) { chain = chain.then(function () { return vm.setState(s.fileId, s.state); }); });
      return chain;
    }

    function startDesktop() {
      var s = document.createElement('script');
      s.src = 'js/desktop.js';
      document.body.appendChild(s);
    }

    if (!window.__bootImageId) { fail('No image id in URL.'); return; }

    host.getFile(window.__bootImageId).then(function (rec) {
      if (!rec) { fail('Image not found on the host Home Screen (was it deleted?).'); return null; }
      var name = rec.name || 'computer image';
      document.getElementById('vm-name').textContent = name;
      document.title = name + ' — booted image';
      return vm.allItems().then(function (existing) {
        if (existing.length) return startDesktop();     // resume the running VM
        var bytes = rec.bytes instanceof Uint8Array ? rec.bytes : new Uint8Array(rec.bytes);
        return gif.decode(bytes).then(function (archive) {
          if (!archive || !archive.files['desktop.json']) { fail('Not a GifOS desktop image.'); return; }
          return hydrate(archive).then(startDesktop);
        });
      });
    }).catch(function (e) { fail('Boot failed: ' + (e && e.message || e)); });

    document.getElementById('vm-reboot').onclick = function () {
      if (!confirm('Reboot fresh? Changes made inside this booted computer are discarded and it re-hydrates from the image.')) return;
      vm.clearAll().then(function () { location.reload(); });
    };
  })();
  </script>
</body>
</html>
