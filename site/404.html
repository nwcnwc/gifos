<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex">
<title>GifOS</title>
<script>
/*
 * 404.html — the pretty-link router. GitHub Pages serves this for any path it
 * doesn't know, which is exactly how gifos.app/join/<code> (an app session)
 * and gifos.app/meet/<code> (a meeting) work on a fully static site: the
 * code becomes the session id AND the join key on the relay, no server state
 * anywhere. /call/<code> stays a permanent alias for /meet/<code> so links
 * shared before the rename keep working. Anything unrecognized just goes home.
 */
(function () {
  // /meet/<room>/<verifier> is an ADMIN-MANAGED room — a DIFFERENT room from
  // /meet/<room>. The verifier segment is part of the room's identity (safe
  // to share publicly); admin power is knowing the password it derives from.
  // Room ids can be as short as ONE character: gifos.app/meet/a is a global
  // public channel anyone in the world can wander into. Group moderation
  // (anyone can mute/blur anyone) keeps the low channels civilized.
  var m = location.pathname.match(/^\/(?:join|meet|call)\/([a-z0-9-]{1,64})(?:\/([a-f0-9]{16,64}))?\/?$/i);
  if (m) {
    var code = m[1];
    var verifier = m[2] ? m[2].toLowerCase() : '';
    var extra = location.search ? '&' + location.search.slice(1) : '';
    if (/^\/(?:meet|call)\//.test(location.pathname)) {
      location.replace('/meet.html#v=' + code + '&k=' + code + (verifier ? '&av=' + verifier : '') + extra);
    } else if (verifier) {
      // Owned app: the session id is "<room>.<verifier>" and the join token is
      // the verifier (public). The host SECRET is never in the link.
      location.replace('/run.html#s=' + code + '.' + verifier + '&k=' + verifier + extra);
    } else {
      location.replace('/run.html#j=' + code + extra);
    }
    return;
  }
  location.replace('/');
})();
</script>
</head>
<body></body>
</html>
