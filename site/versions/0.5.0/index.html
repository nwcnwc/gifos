<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GifOS — Your GIF-Powered Desktop</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%A6%3C/text%3E%3C/svg%3E">
<script>
// Version + pinning bootstrap. Runs before any app code. The canonical site
// (gifos.app/) is always the latest build; past builds live under
// /versions/<x.y.z>/. A user can pin a version (deep Settings) — we redirect
// here so the pin takes effect before anything else loads. ?unpin returns to
// latest. Archived builds live under /versions/ and never redirect again.
window.GIFOS_VERSION = '0.5.0';
(function () {
  window.gifosPinTarget = function (pathname, search) {
    var q = new URLSearchParams(search || '');
    if (q.has('unpin') || q.has('latest')) { try { localStorage.removeItem('gifos_pin'); } catch (e) {} return { clear: true }; }
    var pin = null; try { pin = localStorage.getItem('gifos_pin'); } catch (e) {}
    if (pin && pin !== window.GIFOS_VERSION && pathname.indexOf('/versions/') === -1) return { redirect: '/versions/' + pin + '/' };
    return null;
  };
  var d = window.gifosPinTarget(location.pathname, location.search);
  if (d && d.clear) history.replaceState(null, '', location.pathname);
  else if (d && d.redirect) location.replace(d.redirect);
})();
</script>
<link rel="stylesheet" href="css/desktop.css">
</head>
<body>
  <div class="update-bar" id="update-bar" style="display:none">
    <span id="update-msg">A new version of GifOS is available.</span>
    <button id="update-action">Reload</button>
    <button class="dismiss" id="update-dismiss" title="Dismiss">✕</button>
  </div>
  <div class="menubar">
    <button class="brand-btn" id="sys-menu-btn"><span class="brand">GifOS</span><span class="caret">▾</span></button>
    <span class="crumbs" id="crumbs">Desktop</span>
    <span class="spacer"></span>
    <button id="add-btn">＋ Add</button>
    <button class="pill" id="storage-pill" title="Local storage used by this desktop">💾 …</button>
  </div>
  <div id="desktop"></div>
  <input type="file" id="file-input" multiple style="display:none">
  <input type="file" id="restore-input" accept=".gif,image/gif" style="display:none">

  <script src="js/gifos-gif.js"></script>
  <script src="js/gifos-store.js"></script>
  <script src="js/sample-apps.js"></script>
  <script src="js/desktop.js"></script>
</body>
</html>
