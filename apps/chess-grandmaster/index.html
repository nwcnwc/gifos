<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Chess Grandmaster</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="brand"><span class="logo">♞</span> Chess Grandmaster</div>
  <div class="engine-chip" id="engineChip"><span class="dot"></span><span id="engineState">Booting engine…</span></div>
</header>

<main>
  <!-- Setup card: pick side, strength, and thinking time -->
  <section class="card setup" id="setup">
    <h2>New game</h2>
    <label class="row">Play as
      <div class="seg" id="sideSeg">
        <button data-side="w" class="on">♔ White</button>
        <button data-side="b">♚ Black</button>
        <button data-side="r">Random</button>
      </div>
    </label>
    <label class="row">Strength
      <select id="levelSel"></select>
    </label>
    <p class="lvlnote" id="lvlNote"></p>
    <label class="row">Engine thinks
      <select id="timeSel">
        <option value="300">Fast — 0.3s</option>
        <option value="800" selected>Normal — 0.8s</option>
        <option value="2000">Slow — 2s</option>
        <option value="5000">Deep — 5s</option>
      </select>
    </label>
    <button class="primary" id="startBtn" disabled>Loading engine…</button>
  </section>

  <!-- Game view -->
  <section class="game" id="game" hidden>
    <div class="evalwrap">
      <div class="evalbar" id="evalBar" title="Win / draw / loss for White"><i class="w"></i><i class="d"></i><i class="b"></i></div>
      <div class="evalnum" id="evalNum">0.0</div>
    </div>

    <div class="boardwrap">
      <div class="board" id="board"></div>
    </div>

    <div class="wdl" id="wdl">
      <span class="chip win">White <b id="pw">–</b></span>
      <span class="chip draw">Draw <b id="pd">–</b></span>
      <span class="chip loss">Black <b id="pb">–</b></span>
    </div>

    <div class="statusline" id="statusLine">Your move.</div>

    <div class="controls">
      <button id="hintBtn" class="ghost">💡 Hint</button>
      <button id="undoBtn" class="ghost">↶ Take back</button>
      <button id="resignBtn" class="ghost">🏳 Resign</button>
      <button id="newBtn" class="ghost">＋ New game</button>
    </div>

    <div class="analysis">
      <div class="best" id="bestLine"></div>
      <div class="moves" id="moveList"></div>
    </div>
  </section>
</main>

<!-- Promotion picker -->
<div class="promo" id="promo" hidden>
  <div class="promo-box">
    <p>Promote to…</p>
    <div class="promo-choices" id="promoChoices"></div>
  </div>
</div>

<!-- order matters: rules → engine glue (string) → engine wasm (string) → driver → app.
     sf-glue.js and sf-wasm.js are generated by build.mjs and packed into the GIF. -->
<script src="chess.js"></script>
<script src="sf-glue.js"></script>
<script src="sf-wasm.js"></script>
<script src="engine.js"></script>
<script src="app.js"></script>
</body>
</html>
