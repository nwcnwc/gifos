name = "gifos-relay"
main = "src/relay.js"
compatibility_date = "2026-01-01"

# One Durable Object class = one live session hub. Nothing is persisted to
# storage; the DO only holds in-memory sockets while peers are connected.
[[durable_objects.bindings]]
name = "SESSION"
class_name = "Session"

# SQLite-backed DO class: required on the Workers Free plan (we never write
# to storage, but the class must still be declared this way).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["Session"]

# Branded domain — TWO bindings on purpose:
#
# 1. The custom domain manages DNS + the TLS certificate for relay.gifos.app.
# 2. The explicit zone ROUTE is what actually wins the traffic. Cloudflare's
#    precedence rule is: ROUTES BEAT CUSTOM DOMAINS when both match a request
#    — specificity only breaks ties between routes. The gifos-mirror Worker
#    holds a `*.gifos.app/*` wildcard route (numbered subdomains), and without
#    our own route it intercepts relay.gifos.app and 301s it to the desktop,
#    killing every WebSocket handshake. Route-vs-route, the non-wildcard
#    `relay.gifos.app/*` is more specific and wins.
[[routes]]
pattern = "relay.gifos.app"
custom_domain = true

[[routes]]
pattern = "relay.gifos.app/*"
zone_name = "gifos.app"
