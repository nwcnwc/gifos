name = "gifos-relay"
main = "src/relay.js"
compatibility_date = "2026-01-01"

# One Durable Object class = one live session hub. Sockets are accepted via
# the WebSocket HIBERNATION API, so idle sessions are evicted from memory and
# accrue no duration charges. The only stored state is the session/room token
# (a few bytes), which is what makes call-room URLs work forever.
[[durable_objects.bindings]]
name = "SESSION"
class_name = "Session"

# SQLite-backed DO class: required on the Workers Free plan.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["Session"]

# Branded domain — TWO bindings on purpose:
#
# 1. The custom domain manages DNS + the TLS certificate for relay.gifos.app.
# 2. The explicit zone ROUTE is what actually wins the traffic. Cloudflare's
#    precedence rule is: ROUTES BEAT CUSTOM DOMAINS when both match a request
#    — specificity only breaks ties between routes. The gifos-mirror Worker
#    used to hold a `*.gifos.app/*` wildcard route (now narrowed to the ten
#    digit subdomains), and without our own route it intercepted
#    relay.gifos.app and 301'd it to the desktop, killing every WebSocket
#    handshake. Keep this route even though the wildcard is gone — it makes
#    the relay immune to any future wildcard coming back.
[[routes]]
pattern = "relay.gifos.app"
custom_domain = true

[[routes]]
pattern = "relay.gifos.app/*"
zone_name = "gifos.app"
