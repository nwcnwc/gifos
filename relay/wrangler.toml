name = "gifos-relay"
main = "src/relay.js"
compatibility_date = "2026-01-01"

# One Durable Object class = one live session hub. Nothing is persisted to
# storage; the DO only holds in-memory sockets while peers are connected.
[[durable_objects.bindings]]
name = "SESSION"
class_name = "Session"

# SQLite-backed DO class: required on the Workers Free plan (we never write
# to storage, but the class must still be declared this way).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["Session"]

# Branded domain. Requires the gifos.app zone to be on Cloudflare (nameservers
# moved from GoDaddy). Alternatively add it in the dashboard after deploy:
# Workers & Pages → gifos-relay → Settings → Domains & Routes → Custom Domain.
[[routes]]
pattern = "relay.gifos.app"
custom_domain = true
