# Publish ONLY the site/ directory to GitHub Pages (gifos.app).
# Everything else in the repo — tests, relay source, design docs — is
# deliberately outside the publish boundary and never reachable on the domain.
name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: https://gifos.app/
    runs-on: ubuntu-latest
    steps:
      # Full history so the edge build number (count of site-touching commits) is
      # accurate — a shallow checkout would report 1.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/configure-pages@v5
      # Edge build number: a monotonic counter that bumps on every push touching
      # the site tree. DERIVED (git rev-list count), not a committed counter, so no
      # self-triggering commit loop and it always deploys.
      #
      # ANCHORED: this branch's history was squashed/re-imported, so a raw
      # `rev-list --count` under-counts (the pre-0.8.0 history is collapsed into one
      # commit). We instead count site commits SINCE the v0.8.0 cut and add the real
      # commit count v0.8.0 had in the original history — so the number lines up with
      # the actual project history (0.6.0=31, 0.7.0=268, 0.8.0=280) and keeps
      # climbing. Bump ANCHOR_* when you re-anchor at a future release.
      - name: Stamp edge build number
        run: |
          ANCHOR_SHA=3d84267            # the "release: cut v0.8.0" commit
          ANCHOR_BUILD=280              # v0.8.0's real commit count in the original history
          SINCE=$(git rev-list --count ${ANCHOR_SHA}..HEAD -- site 2>/dev/null || echo 0)
          BUILD=$((ANCHOR_BUILD + SINCE))
          echo "edge build = $BUILD (anchor $ANCHOR_BUILD + $SINCE since $ANCHOR_SHA)"
          printf '/* baked at deploy by pages.yml — see site/js/build.js */\nwindow.GIFOS_BUILD = %s;\n' "$BUILD" > site/js/build.js
          node -e "const f='site/version.json',j=JSON.parse(require('fs').readFileSync(f));j.edgeBuild=$BUILD;require('fs').writeFileSync(f,JSON.stringify(j,null,2)+'\n')"
      # Cache-busting: stamp ?v=<short-sha> onto every LOCAL css/js reference in
      # the published HTML. Each deploy gets a unique version, so a returning
      # browser fetches fresh CSS/JS the moment it loads a new page instead of
      # serving a stale cached asset. Only relative paths match (no ':' → skips
      # http(s) URLs; no '?' → never double-stamps); serving site/ directly in
      # dev is unaffected since static servers ignore the query string.
      - name: Cache-bust local css/js assets
        run: |
          SHA="${GITHUB_SHA::8}"
          find site -name '*.html' -print0 \
            | xargs -0 sed -i -E "s/(href|src)=\"([^\":?]+\.(css|js))\"/\1=\"\2?v=${SHA}\"/g"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      # GitHub Pages' backend occasionally returns a transient
      # "Deployment failed, try again later." even though the artifact
      # uploaded fine. Retry the deploy a few times so a platform hiccup
      # never strands the live site on an old build.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - id: deployment2
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - id: deployment3
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        uses: actions/deploy-pages@v4
      # Tell IndexNow-capable engines (Bing, Yandex, Seznam, Naver…) that the
      # site changed. Google doesn't use IndexNow — it discovers via the
      # sitemap + Search Console. Failures here must never fail a deploy.
      - name: Ping IndexNow
        continue-on-error: true
        run: |
          curl -sS -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{"host":"gifos.app","key":"762b4690f472ea2ae0242c947cbc3cc3","keyLocation":"https://gifos.app/762b4690f472ea2ae0242c947cbc3cc3.txt","urlList":["https://gifos.app/","https://gifos.app/about.html","https://gifos.app/llms.txt","https://gifos.app/sitemap.xml"]}' || true
