<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GifOS — Running…</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body { display: flex; flex-direction: column; background: #0a0a0f; color: #e0e0f0;
         font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
  .bar { display: flex; align-items: center; gap: .6rem; padding: .5rem .9rem;
         background: #14141f; border-bottom: 1px solid #2a2a3f; }
  .bar .title { font-weight: 700; }
  .bar .status { color: #8888aa; font-size: .8rem; margin-left: auto; }
  .bar button { padding: .35rem .9rem; border-radius: .4rem; border: 1px solid #2a2a3f;
                background: #1c1c2b; color: #e0e0f0; cursor: pointer; font-size: .8rem; }
  .bar button:hover { border-color: #7b5cff; }
  #mount { flex: 1; min-height: 0; }
  .share { display: none; align-items: center; gap: .5rem; padding: .5rem .9rem;
           background: #12121c; border-bottom: 1px solid #2a2a3f; font-size: .8rem; }
  .share.show { display: flex; }
  .share input { flex: 1; padding: .35rem .6rem; border-radius: .4rem; border: 1px solid #2a2a3f;
                 background: #0a0a0f; color: #7b5cff; font-family: ui-monospace, monospace; font-size: .78rem; }
  .share .hint { color: #8888aa; }
</style>
</head>
<body>
  <div class="bar">
    <span class="title">📦 GifOS</span>
    <button id="host" title="Let friends join over the relay">👥 Go Multiplayer</button>
    <button id="save">💾 Snapshot</button>
    <span class="status" id="status">Loading…</span>
  </div>
  <div class="share" id="share">
    <span class="hint">Share this link — friends open it to join your session:</span>
    <input id="share-url" readonly>
    <button id="copy">Copy</button>
  </div>
  <div id="mount"></div>

  <script src="js/gifos-gif.js"></script>
  <script src="js/gifos-store.js"></script>
  <script src="js/relay-config.js"></script>
  <script src="js/runtime.js"></script>
  <script>
    (function () {
      const params = new URLSearchParams(location.hash.slice(1));
      const mount = document.getElementById('mount');
      const status = document.getElementById('status');
      const hostBtn = document.getElementById('host');
      const saveBtn = document.getElementById('save');
      const share = document.getElementById('share');
      const shareUrl = document.getElementById('share-url');
      let controller = null;

      if (params.get('s')) {
        // Client mode — join a host over the relay. No local file.
        hostBtn.style.display = 'none';
        GifOS.runtime.bootClient(mount, { s: params.get('s'), k: params.get('k'), relay: params.get('relay') }, status)
          .then(function (c) { controller = c; });
      } else {
        // Standalone / potential host — run a local App GIF.
        const fileId = params.get('id');
        if (!fileId) { status.textContent = 'No app id in URL.'; return; }
        GifOS.runtime.boot(mount, fileId, status).then(function (c) { controller = c; });
      }

      hostBtn.addEventListener('click', function () {
        if (!controller || !controller.becomeHost) return;
        hostBtn.disabled = true; hostBtn.textContent = 'Connecting…';
        controller.becomeHost().then(function (r) {
          shareUrl.value = r.shareUrl; share.classList.add('show');
          hostBtn.textContent = '👥 Hosting';
        }).catch(function (err) {
          hostBtn.disabled = false; hostBtn.textContent = '👥 Go Multiplayer';
          status.textContent = 'Multiplayer failed: ' + err.message;
        });
      });
      document.getElementById('copy').addEventListener('click', function () {
        shareUrl.select(); try { document.execCommand('copy'); } catch (e) {}
        if (navigator.clipboard) navigator.clipboard.writeText(shareUrl.value).catch(function () {});
      });
      saveBtn.addEventListener('click', function () {
        if (!controller) return;
        controller.save().then(function (name) { if (name) status.textContent = 'Snapshot saved: ' + name; });
      });
    })();
  </script>
</body>
</html>
