name = "gifos-mirror"
main = "src/mirror.js"
compatibility_date = "2026-01-01"

# EXPLICIT ALLOW-LIST of theme subdomains — one route each, never a
# "*.gifos.app/*" wildcard. The enumeration IS the security boundary: requests
# to any un-listed subdomain never invoke this Worker (no free-tier request
# burned by bots probing random hostnames — they fall through to the zone's DNS
# target and die there), so nobody can spin up infinite computers.
#
# TO ADD A COMPUTER: add its themes/<label>/ folder to the site, then add a
# route block below (named labels are fine, e.g. "neon.gifos.app/*") and run
# `npx wrangler deploy`. Requires a proxied (orange-cloud) DNS record covering
# the name — the existing "*" record works; see README.
# New named computers go here too, e.g.:
#   [[routes]]
#   pattern = "neon.gifos.app/*"
#   zone_name = "gifos.app"
[[routes]]
pattern = "0.gifos.app/*"
zone_name = "gifos.app"
[[routes]]
pattern = "1.gifos.app/*"
zone_name = "gifos.app"
[[routes]]
pattern = "2.gifos.app/*"
zone_name = "gifos.app"
[[routes]]
pattern = "3.gifos.app/*"
zone_name = "gifos.app"
[[routes]]
pattern = "4.gifos.app/*"
zone_name = "gifos.app"
[[routes]]
pattern = "5.gifos.app/*"
zone_name = "gifos.app"
[[routes]]
pattern = "6.gifos.app/*"
zone_name = "gifos.app"
[[routes]]
pattern = "7.gifos.app/*"
zone_name = "gifos.app"
[[routes]]
pattern = "8.gifos.app/*"
zone_name = "gifos.app"
[[routes]]
pattern = "9.gifos.app/*"
zone_name = "gifos.app"
# Named computer: Grok Imagine showcase
[[routes]]
pattern = "imagine.gifos.app/*"
zone_name = "gifos.app"
# Named computer: David Welk — deep-space / WebGL showcase
[[routes]]
pattern = "davidwelk.gifos.app/*"
zone_name = "gifos.app"
# Named computer: Orrery — a live moving solar system (WebGL)
[[routes]]
pattern = "orrery.gifos.app/*"
zone_name = "gifos.app"
